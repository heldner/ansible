---
- name: Ensure common packages installed
  ansible.builtin.package:
    state: present
    name:
      - acl
      - at
      - bat
      - bwm-ng
      - console-data
      - curl
      - dconf-service
      - debsums
      - dirmngr
      - dosfstools
      - du-dust
      - duf
      - exfatprogs
      - f2fs-tools
      - fbreader
      - fonts-hermit
      - fonts-indic
      - fonts-noto-color-emoji
      - fonts-powerline
      - ipython3
      - jnettop
      - keychain
      - man-db
      - ncal
      - ncdu
      - nmap
      - p7zip-full
      - python3-pip
      - qbittorrent
      - quilt
      - ripgrep
      - rsync
      - shellcheck
      - strace
      - tcpdump
      - w3m
      - xkcdpass
      - zbar-tools
  become: true
  tags: common

- name: Remove unwanted packages
  ansible.builtin.package:
    state: absent
    pkg:
      - avahi-autoipd
      - avahi-daemon
      - ibus
  become: true
  tags: common

- name: Copy jenttop desktopfile
  ansible.builtin.copy:
    src: 'jnettop.desktop'
    dest: "{{ ansible_user_dir +
      '/.local/share/applications/jnettop.desktop' }}"
    mode: '0644'
  tags: common

- ansible.builtin.include_tasks: 'lsd.yml'
  tags: common
