---
- name: Install unzip for etesync-dav release extraction
  ansible.builtin.package:
    name: unzip
    state: present
  become: true
  tags:
    - etesync_dav
    - install

- name: Assert supported CPU architecture
  ansible.builtin.assert:
    that:
      - ansible_architecture in _etesync_dav_arch_map
    fail_msg: >-
      etesync-dav role supports only x86_64 and aarch64 (current: {{ ansible_architecture }})
  tags:
    - etesync_dav

- name: Download etesync-dav release archive from GitHub
  ansible.builtin.get_url:
    url: "{{ _etesync_dav_url }}"
    dest: "/tmp/etesync-dav-v{{ etesync_dav_version }}.zip"
    mode: "0644"
  tags:
    - etesync_dav

- name: Create etesync-dav extract directory
  ansible.builtin.file:
    path: "/tmp/etesync-dav-v{{ etesync_dav_version }}"
    state: directory
    mode: "0755"
  tags:
    - etesync_dav

- name: Extract etesync-dav archive
  ansible.builtin.unarchive:
    src: "/tmp/etesync-dav-v{{ etesync_dav_version }}.zip"
    dest: "/tmp/etesync-dav-v{{ etesync_dav_version }}"
    remote_src: true
    creates: "/tmp/etesync-dav-v{{ etesync_dav_version }}/{{ _etesync_dav_current_arch.bin }}"
  tags:
    - etesync_dav

- name: Install etesync-dav binary
  ansible.builtin.copy:
    src: "/tmp/etesync-dav-v{{ etesync_dav_version }}/{{ _etesync_dav_current_arch.bin }}"
    dest: "{{ etesync_dav_binary_path }}"
    mode: "0755"
    remote_src: true
  become: true
  notify: Restart etesync-dav
  tags:
    - etesync_dav

- name: Create user systemd unit directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/systemd/user"
    state: directory
    mode: "0755"
  tags:
    - etesync_dav

- name: Install user systemd unit for etesync-dav
  ansible.builtin.template:
    src: etesync-dav.service.j2
    dest: "{{ ansible_user_dir }}/.config/systemd/user/etesync-dav.service"
    mode: "0644"
  notify: Restart etesync-dav
  tags:
    - etesync_dav

- name: Enable systemd linger for user
  ansible.builtin.command:
    argv:
      - loginctl
      - enable-linger
      - "{{ ansible_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ ansible_user }}"
  become: true
  when: etesync_dav_enable_linger | default('false') | bool
  tags:
    - etesync_dav

- name: Enable and start etesync-dav user service
  ansible.builtin.systemd:
    name: etesync-dav
    scope: user
    state: started
    enabled: true
    daemon_reload: true
  when: etesync_dav_enable_service | default('true') | bool
  tags:
    - etesync_dav
