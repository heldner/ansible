---
- name: Install sthp package
  ansible.builtin.apt:
    deb: "{{ 'https://github.com/heldner/deb-packages/releases/download/sthp/' +
      sthp_version + '/sthp_' + sthp_deb_version + '_amd64.deb' }}"
    force: true
  when: >
    (ansible_facts.packages['sthp'] is defined and
    ansible_facts.packages['sthp'][0]['version'] != sthp_deb_version) or
    ansible_facts.packages['sthp'] is not defined
  become: true
  tags: sthp

- name: Pin sthp package
  ansible.builtin.dpkg_selections:
    name: sthp
    selection: hold
  changed_when: false
  become: true
  tags: [sthp, pin]

- name: Configure sthp
  ansible.builtin.template:
    src: sthp.default.j2
    dest: /etc/default/sthp
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart sthp
  tags: sthp
